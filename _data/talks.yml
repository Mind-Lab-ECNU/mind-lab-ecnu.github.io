upcoming:
  - title: "迈向个性化智能体"
    speaker: "代忠祥"
    affiliation: "香港中文大学（深圳）数据科学学院助理教授、博士生导师"
    date: "2026年4月2日（周四）13:00-15:00 · 文科大楼914 / 腾讯会议 499-988-397"
    host: "张敏"
    abstract: "本次报告将围绕个性化智能体的构建展开，介绍从单一模型偏好对齐到动态推理工作流，再到多智能体协同优化的研究脉络，涵盖免参数微调的个性化反馈、面向复杂任务的动态工作流以及基于图神经网络与多臂老虎机的协同优化方法。"
    image: assets/images/talk-2026-04-02-daizhongxiang-placeholder.svg
    homepage: https://daizhongxiang.github.io/

